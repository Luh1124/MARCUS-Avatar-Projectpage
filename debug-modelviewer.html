<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MARCUS-Avatar model-viewer debug</title>
    <script type="module" src="assets/vendor/model-viewer.min.js"></script>
    <style>
      :root {
        color: #142426;
        background: #f6f8f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        padding: 28px;
      }

      main {
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(320px, 420px);
        gap: 24px;
        max-width: 1180px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #607173;
        line-height: 1.6;
      }

      model-viewer {
        display: block;
        width: 100%;
        height: min(72vh, 680px);
        min-height: 460px;
        border: 1px solid #d9e1df;
        border-radius: 8px;
        background: #edf3f0;
      }

      model-viewer img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .panel {
        display: grid;
        gap: 16px;
        align-content: start;
      }

      .box {
        border: 1px solid #d9e1df;
        border-radius: 8px;
        background: #ffffff;
        padding: 16px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      button,
      a {
        border: 1px solid #cfdad8;
        border-radius: 8px;
        background: #ffffff;
        color: #142426;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        padding: 0 14px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
      }

      button.active {
        border-color: #123234;
        background: #123234;
        color: #ffffff;
      }

      code,
      pre {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      pre {
        max-height: 52vh;
        overflow: auto;
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        color: #263638;
        font-size: 12px;
        line-height: 1.55;
      }

      .status {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }

      .status div {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        border-top: 1px solid #edf1f0;
        padding-top: 8px;
      }

      .ok {
        color: #0f7b65;
      }

      .bad {
        color: #bd4836;
      }

      @media (max-width: 880px) {
        body {
          padding: 16px;
        }

        main {
          grid-template-columns: 1fr;
        }

        model-viewer {
          height: 58vh;
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>model-viewer debug</h1>
        <p>
          Open this through a local server, for example
          <code>http://127.0.0.1:4173/debug-modelviewer.html</code>. Opening it as <code>file://</code> is expected to
          expose browser security failures.
        </p>
        <div style="height: 16px"></div>
        <model-viewer
          id="viewer"
          src="assets/supplement/models/model-03/full.glb"
          poster="assets/supplement/models/model-03/render.png"
          camera-controls
          auto-rotate
          loading="eager"
          reveal="auto"
          exposure="0.95"
          shadow-intensity="0.7"
          camera-orbit="0deg 74deg 1.9m"
          field-of-view="24deg"
          alt="MARCUS-Avatar debug GLB"
        >
          <img src="assets/supplement/models/model-03/render.png" alt="Rendered 3D fallback preview" />
        </model-viewer>
      </section>

      <aside class="panel">
        <section class="box">
          <strong>Model source</strong>
          <div class="actions" style="margin-top: 12px">
            <button class="active" type="button" data-src="assets/supplement/models/model-03/full.glb">full.glb</button>
            <button type="button" data-src="assets/supplement/models/model-03/geometry_gray.glb">geometry_gray.glb</button>
            <a href="assets/supplement/models/model-03/full.glb">open GLB</a>
          </div>
          <div class="status" id="status"></div>
        </section>

        <section class="box">
          <strong>Runtime log</strong>
          <pre id="log"></pre>
        </section>
      </aside>
    </main>

    <script>
      const viewer = document.querySelector("#viewer");
      const logEl = document.querySelector("#log");
      const statusEl = document.querySelector("#status");
      const checks = new Map();

      function write(message, level = "info") {
        const time = new Date().toLocaleTimeString();
        logEl.textContent += `[${time}] ${level.toUpperCase()} ${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function setCheck(name, ok, detail) {
        checks.set(name, { ok, detail });
        statusEl.innerHTML = "";
        for (const [label, value] of checks) {
          const row = document.createElement("div");
          const state = value.ok ? "ok" : "bad";
          row.innerHTML = `<span>${label}</span><strong class="${state}">${value.ok ? "OK" : "FAIL"}</strong>`;
          row.title = value.detail;
          statusEl.append(row);
        }
      }

      async function testFetch(label, url) {
        try {
          const response = await fetch(url, { cache: "no-store" });
          setCheck(label, response.ok, `${response.status} ${response.statusText}`);
          write(`${label}: ${response.status} ${response.statusText} (${url})`, response.ok ? "info" : "warn");
        } catch (error) {
          setCheck(label, false, error.message);
          write(`${label}: ${error.message}`, "error");
        }
      }

      function testImage(url) {
        const image = new Image();
        image.onload = () => {
          setCheck("poster image", true, `${image.naturalWidth} x ${image.naturalHeight}`);
          write(`poster image loaded: ${image.naturalWidth} x ${image.naturalHeight}`);
        };
        image.onerror = () => {
          setCheck("poster image", false, url);
          write(`poster image failed: ${url}`, "error");
        };
        image.src = url;
      }

      write(`page protocol: ${location.protocol}`);
      if (location.protocol === "file:") {
        write("file:// detected. This can block ES modules and GLB fetches; use a local HTTP server.", "warn");
      }

      customElements
        .whenDefined("model-viewer")
        .then(() => {
          setCheck("custom element", true, "<model-viewer> registered");
          write("<model-viewer> custom element registered");
        })
        .catch((error) => {
          setCheck("custom element", false, error.message);
          write(`<model-viewer> registration failed: ${error.message}`, "error");
        });

      window.setTimeout(() => {
        if (!customElements.get("model-viewer")) {
          setCheck("custom element", false, "customElements.get('model-viewer') is empty after 2s");
          write("<model-viewer> was not registered after 2 seconds", "error");
        }
      }, 2000);

      viewer.addEventListener("load", () => {
        setCheck("viewer load event", true, viewer.src);
        write(`viewer load event: ${viewer.getAttribute("src")}`);
      });
      viewer.addEventListener("error", (event) => {
        setCheck("viewer load event", false, viewer.src);
        write(`viewer error event: ${event.detail?.message || "no detail"}`, "error");
      });
      viewer.addEventListener("progress", (event) => {
        const totalProgress = event.detail?.totalProgress;
        if (typeof totalProgress === "number") {
          write(`viewer progress: ${Math.round(totalProgress * 100)}%`);
        }
      });

      document.querySelectorAll("button[data-src]").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("button[data-src]").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          viewer.setAttribute("src", button.dataset.src);
          testFetch("active GLB fetch", button.dataset.src);
          write(`src switched to ${button.dataset.src}`);
        });
      });

      testImage("assets/supplement/models/model-03/render.png");
      testFetch("model-viewer script", "assets/vendor/model-viewer.min.js");
      testFetch("active GLB fetch", viewer.getAttribute("src"));
    </script>
  </body>
</html>
